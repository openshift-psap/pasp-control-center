version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pasp-backend-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./kubeconfigs:/app/kubeconfigs
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/pasp_control_center.db
      - KUBECONFIG_STORAGE_PATH=/app/kubeconfigs
      - SECRET_KEY=dev-secret-key
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pasp-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
